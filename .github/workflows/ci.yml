name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: oadtd
          POSTGRES_USER: oadtd
          POSTGRES_PASSWORD: oadtd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oadtd -d oadtd"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      OATD_TEST_POSTGRES_DSN: postgres://oadtd:oadtd@localhost:5432/oadtd?sslmode=disable
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.11"
      - run: go mod download
      - run: go vet ./...
      - name: Test with race detector
        run: go test -race ./...
      - name: Smoke test local startup
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          go build -o /tmp/oadtd ./cmd/oadtd
          /tmp/oadtd --demo --addr 127.0.0.1:0 --insecure >"$log" 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true; wait "$pid" 2>/dev/null || true' EXIT
          addr=""
          for _ in $(seq 1 60); do
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "server process exited before it became ready" >&2
              cat "$log"
              exit 1
            fi
            addr="$(grep -Eo 'http://[^[:space:]]+' "$log" | tail -n 1 || true)"
            if [ -n "$addr" ]; then
              break
            fi
            sleep 1
          done
          if [ -z "$addr" ]; then
            cat "$log"
            exit 1
          fi
          if ! curl --fail --silent "$addr/healthz" >/dev/null; then
            echo "healthz check failed for $addr" >&2
            cat "$log"
            exit 1
          fi
          kill "$pid"
          wait "$pid" || true
          trap - EXIT

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.11"
      - name: Build binaries
        shell: bash
        run: |
          suffix=""
          if [ "${{ matrix.goos }}" = "windows" ]; then suffix=".exe"; fi
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "dist/oadtd-${{ matrix.goos }}-${{ matrix.goarch }}${suffix}" ./cmd/oadtd
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "dist/oadtdctl-${{ matrix.goos }}-${{ matrix.goarch }}${suffix}" ./cmd/oadtdctl
