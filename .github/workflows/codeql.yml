name: codeql

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "24 3 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          languages: go
      - uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357
