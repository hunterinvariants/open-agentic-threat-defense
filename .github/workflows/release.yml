name: release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.11"
      - run: go test ./...
      - name: Build
        shell: bash
        run: |
          suffix=""
          if [ "${{ matrix.goos }}" = "windows" ]; then suffix=".exe"; fi
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "dist/oadtd-${{ matrix.goos }}-${{ matrix.goarch }}${suffix}" ./cmd/oadtd
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "dist/oadtdctl-${{ matrix.goos }}-${{ matrix.goarch }}${suffix}" ./cmd/oadtdctl
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: oatd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          path: dist
          merge-multiple: true
      - name: Generate SBOM
        uses: anchore/sbom-action@deef08a0db64bfad603422135db61477b16cef56
        with:
          path: .
          output-file: dist/SBOM.spdx.json
          format: spdx-json
      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          find . -maxdepth 1 -type f \( -name 'oadtd-*' -o -name 'oadtdctl-*' -o -name 'SBOM.spdx.json' \) -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - name: Sign checksum manifest
        shell: bash
        run: |
          cosign sign-blob --yes --bundle dist/SHA256SUMS.bundle --output-signature dist/SHA256SUMS.sig dist/SHA256SUMS
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          files: dist/*
          generate_release_notes: true
