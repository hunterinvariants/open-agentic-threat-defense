name: deploy-self-hosted

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
        type: string
      service:
        description: systemd service name
        required: false
        default: oadtd
        type: string
      ready_path:
        description: Local readiness path
        required: false
        default: /readyz
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: deploy-self-hosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, oadtd-staging]
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"

      - name: Run tests
        run: go test ./...

      - name: Build Linux binaries
        shell: bash
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/oadtd ./cmd/oadtd
          GOOS=linux GOARCH=amd64 go build -o dist/oadtdctl ./cmd/oadtdctl

      - name: Install release locally
        shell: bash
        env:
          RELEASE_ID: ${{ github.sha }}
          SERVICE: ${{ inputs.service }}
          READY_PATH: ${{ inputs.ready_path }}
        run: |
          sudo env \
            DEPLOY_SOURCE_DIR="$GITHUB_WORKSPACE/dist" \
            DEPLOY_TARGET_DIR="/opt/oadtd" \
            DEPLOY_SERVICE="$SERVICE" \
            DEPLOY_READY_PATH="$READY_PATH" \
            DEPLOY_RELEASE_ID="$RELEASE_ID" \
            bash scripts/deploy-release.sh
