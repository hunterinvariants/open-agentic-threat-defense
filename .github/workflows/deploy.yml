name: deploy

on:
  workflow_dispatch:
    inputs:
      host:
        description: SSH host or IP
        required: true
        type: string
      port:
        description: SSH port
        required: false
        default: "22"
        type: string
      user:
        description: SSH user
        required: false
        default: "deploy"
        type: string
      target_dir:
        description: Deployment root directory
        required: false
        default: "/opt/oadtd"
        type: string
      service:
        description: systemd service name
        required: false
        default: "oadtd"
        type: string
      ready_path:
        description: Local readiness path
        required: false
        default: "/readyz"
        type: string
      goarch:
        description: Target GOARCH
        required: false
        default: "amd64"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Run tests
        run: go test ./...

      - name: Build Linux binaries
        shell: bash
        run: |
          mkdir -p dist
          GOOS=linux GOARCH="${{ inputs.goarch }}" go build -o dist/oadtd ./cmd/oadtd
          GOOS=linux GOARCH="${{ inputs.goarch }}" go build -o dist/oadtdctl ./cmd/oadtdctl

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OATD_DEPLOY_SSH_KEY }}

      - name: Trust host key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ inputs.port }}" -H "${{ inputs.host }}" >> ~/.ssh/known_hosts

      - name: Prepare remote temp directory
        shell: bash
        env:
          DEPLOY_HOST: ${{ inputs.host }}
          DEPLOY_PORT: ${{ inputs.port }}
          DEPLOY_USER: ${{ inputs.user }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /tmp/oadtd-$RELEASE_ID"

      - name: Upload release bundle
        shell: bash
        env:
          DEPLOY_HOST: ${{ inputs.host }}
          DEPLOY_PORT: ${{ inputs.port }}
          DEPLOY_USER: ${{ inputs.user }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          scp -P "$DEPLOY_PORT" dist/oadtd dist/oadtdctl "$DEPLOY_USER@$DEPLOY_HOST:/tmp/oadtd-$RELEASE_ID/"

      - name: Activate release
        shell: bash
        env:
          DEPLOY_HOST: ${{ inputs.host }}
          DEPLOY_PORT: ${{ inputs.port }}
          DEPLOY_USER: ${{ inputs.user }}
          TARGET_DIR: ${{ inputs.target_dir }}
          SERVICE: ${{ inputs.service }}
          READY_PATH: ${{ inputs.ready_path }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "sudo env DEPLOY_SOURCE_DIR='/tmp/oadtd-$RELEASE_ID' DEPLOY_TARGET_DIR='$TARGET_DIR' DEPLOY_SERVICE='$SERVICE' DEPLOY_READY_PATH='$READY_PATH' DEPLOY_RELEASE_ID='$RELEASE_ID' bash -s" < scripts/deploy-release.sh
