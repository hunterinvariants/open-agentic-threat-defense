name: Feature request
description: Suggest defensive functionality or operational improvements.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What defensive workflow or operational gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should OATD do?
    validations:
      required: true
  - type: dropdown
    id: edition
    attributes:
      label: Likely Edition
      options:
        - Community core
        - Commercial/enterprise
        - Unsure
    validations:
      required: true

