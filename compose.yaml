services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oadtd
      POSTGRES_USER: oadtd
      POSTGRES_PASSWORD: oadtd
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oadtd -d oadtd"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
